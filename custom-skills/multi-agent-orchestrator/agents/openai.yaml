interface:
  display_name: "Multi-Agent Orchestrator 多 Agent 编排"
  short_description: "用 AGENTS.md 固化主线程编排"
  default_prompt: "使用 $multi-agent-orchestrator。先判断当前任务是否真的需要主线程编排；如果项目还没有 `Multi-Agent Orchestrator Mode`，就按 `references/agents-section.md` 补齐 `AGENTS.md`。之后以项目自己的 `AGENTS.md` 为准选择执行载体；如果工具或政策不允许委派，就明确说明 fallback。"
